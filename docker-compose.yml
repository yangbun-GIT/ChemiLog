services:
  customer-web:
    build:
      context: ./frontend/customer-web
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      - spring-main
    ports:
      - "${CUSTOMER_WEB_PORT:-80}:80"
    networks:
      - public-network
      - chemilog-network

  admin-web:
    build:
      context: ./frontend/admin-web
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      - spring-main
    ports:
      - "${ADMIN_WEB_PORT:-8080}:80"
    networks:
      - public-network
      - chemilog-network

  spring-main:
    build:
      context: ./backend/main-service
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      SERVER_PORT: 8081
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE:-dev}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      CHEMILOG_FASTAPI_BASE_URL: http://fastapi-service:8000
      CHEMILOG_INTERNAL_SECRET: ${INTERNAL_API_SECRET}
      CHEMILOG_CORS_ALLOWED_ORIGINS: ${CUSTOMER_WEB_ORIGIN},${ADMIN_WEB_ORIGIN}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - postgres
      - redis
      - fastapi-service
    ports:
      - "${SPRING_MAIN_PORT:-8081}:8081"
    expose:
      - "8081"
    networks:
      - public-network
      - chemilog-network

  fastapi-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-dev}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      SPRING_MAIN_INTERNAL_URL: http://spring-main:8081/api/v1/internal/logs
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MAIN_MODEL: ${OPENAI_MAIN_MODEL:-gpt-4o}
      OPENAI_POLICY_MODEL: ${OPENAI_POLICY_MODEL:-gpt-4o-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
    expose:
      - "8000"
    depends_on:
      - redis
      - milvus
      - minio
    networks:
      - chemilog-network

  postgres:
    image: postgres:15.8-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ:-Asia/Seoul}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - chemilog-network

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      - chemilog-network

  etcd:
    image: quay.io/coreos/etcd:v3.5.17
    restart: unless-stopped
    command:
      - etcd
      - --advertise-client-urls=http://etcd:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
    expose:
      - "2379"
    volumes:
      - etcd_data:/etcd
    networks:
      - chemilog-network

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    restart: unless-stopped
    env_file:
      - .env
    command: server /data --console-address :9001
    expose:
      - "9000"
      - "9001"
    volumes:
      - minio_data:/data
    networks:
      - chemilog-network

  milvus:
    image: milvusdb/milvus:v2.3.21
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      MINIO_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
    depends_on:
      - etcd
      - minio
    expose:
      - "19530"
      - "9091"
    volumes:
      - milvus_data:/var/lib/milvus
    networks:
      - chemilog-network

networks:
  public-network:
    driver: bridge
  chemilog-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  milvus_data:
  etcd_data:
